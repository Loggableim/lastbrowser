name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows installer and auto-update metadata
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test:run

      - name: Build and publish GitHub Release
        run: npm --workspace apps/desktop run package:win:publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
