<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Starting LastBrowser...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0C0C16;
    color: #EAEAEF;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro', 'Segoe UI', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    -webkit-app-region: drag;
  }
  .container {
    text-align: center;
    -webkit-app-region: no-drag;
  }
  .splash-logo { width: 48px; height: 48px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 500; margin-top: 16px; letter-spacing: -0.3px; }
  .tagline { font-size: 13px; color: #686888; margin-top: 8px; }
  .modules { margin-top: 24px; font-size: 11px; color: #686888; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .module-item { display: flex; align-items: center; gap: 6px; opacity: 0; animation: fadeInModule 0.4s ease forwards; }
  .module-item:nth-child(1) { animation-delay: 0.2s; }
  .module-item:nth-child(2) { animation-delay: 0.5s; }
  .module-item:nth-child(3) { animation-delay: 0.8s; }
  .module-item:nth-child(4) { animation-delay: 1.1s; }
  .module-dot { width: 4px; height: 4px; border-radius: 50%; background: #7C6FF0; animation: pulse 1.5s infinite; }
  .module-dot.done { background: #4ADE80; animation: none; }
  @keyframes fadeInModule { to { opacity: 1; } }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
  .spinner {
    margin: 24px auto 0;
    width: 20px; height: 20px;
    border: 2px solid #282844;
    border-top-color: #7C6FF0;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <div class="splash-logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="48" height="48">
      <defs>
        <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#7C6FF0"/>
          <stop offset="100%" stop-color="#5B4FCC"/>
        </linearGradient>
      </defs>
      <g transform="translate(16, 16)">
        <rect x="5" y="2" width="8" height="28" rx="4" fill="url(#sg)"/>
        <rect x="5" y="22" width="28" height="8" rx="4" fill="#60A5FA"/>
        <rect x="13" y="2" width="16" height="3" rx="1.5" fill="#A78BFA" opacity="0.5"/>
      </g>
    </svg>
  </div>
  <h1>Starting LastBrowser</h1>
  <p class="tagline">The last browser you'll ever need.</p>
  <div class="modules">
    <div class="module-item"><span class="module-dot"></span> Restoring workspace...</div>
    <div class="module-item"><span class="module-dot"></span> Initializing agents...</div>
    <div class="module-item"><span class="module-dot"></span> Loading sessions...</div>
    <div class="module-item"><span class="module-dot"></span> Starting services...</div>
  </div>
  <div class="spinner"></div>
</div>
</body>
</html>
