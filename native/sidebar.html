<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LastBrowser Sidebar</title>
<link rel="stylesheet" href="src/renderer/styles/main.css">
<style>
  /* Sidebar-specific overrides */
  body { background:var(--bg-primary); }
  #sidebarApp { width:100%; height:100%; display:flex; flex-direction:column; background:var(--bg-primary); border-right:1px solid var(--border); }
  .sb-header { display:flex; align-items:center; gap:8px; padding:12px 14px; border-bottom:1px solid var(--border); -webkit-app-region:drag; }
  .sb-logo { font-size:20px; }
  .sb-brand { font-size:14px; font-weight:600; }
  .sb-nav { flex:1; overflow-y:auto; padding:8px 6px; display:flex; flex-direction:column; gap:2px; }
  .sb-item { display:flex; align-items:center; gap:10px; width:100%; padding:8px 10px; border:none; border-radius:8px; background:transparent; color:var(--text-muted); cursor:pointer; font-size:13px; text-align:left; transition:all 0.15s; -webkit-app-region:no-drag; }
  .sb-item:hover { background:var(--bg-hover); color:var(--text); }
  .sb-item.active { background:var(--bg-active); color:var(--accent); }
  .sb-item.active::before { content:''; position:absolute; left:-6px; top:50%; transform:translateY(-50%); width:3px; height:16px; background:var(--accent); border-radius:0 2px 2px 0; }
  .sb-item svg { flex-shrink:0; }
  .sb-item span { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sb-status { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text-muted); }
  .sb-footer { border-top:1px solid var(--border); padding:10px 14px; display:flex; flex-direction:column; gap:8px; flex-shrink:0; }
  .sb-actions { display:flex; gap:4px; }
  .sb-action { width:28px; height:28px; border:none; border-radius:6px; background:transparent; color:var(--text-muted); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
  .sb-action:hover { background:var(--bg-hover); color:var(--text); }
</style>
</head>
<body>
<div id="sidebarApp">
  <div class="sb-header">
    <div class="sb-logo">
      <svg viewBox="0 0 32 32" width="20" height="20" fill="none">
        <rect x="5" y="3" width="6" height="18" rx="2.5" fill="#7C6FF0" opacity="0.85"/>
        <rect x="5" y="15" width="18" height="6" rx="2.5" fill="#60A5FA" opacity="0.7"/>
      </svg>
    </div>
    <span class="sb-brand">LastBrowser</span>
  </div>

  <nav class="sb-nav" id="sbNav">
    <button class="sb-item active" data-route="chat" title="Chat">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Chat</span>
    </button>
    <button class="sb-item" data-route="tasks" title="Tasks / Kanban">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span>Tasks</span>
    </button>
    <button class="sb-item" data-route="agents" title="Agents">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      <span>Agents</span>
    </button>
    <button class="sb-item" data-route="workspaces" title="Browser">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>Browser</span>
    </button>
    <button class="sb-item" data-route="kanban" title="Kanban">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg>
      <span>Kanban</span>
    </button>
    <button class="sb-item" data-route="memory" title="Memory">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span>Memory</span>
    </button>
    <button class="sb-item" data-route="skills" title="Skills">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      <span>Skills</span>
    </button>
    <button class="sb-item" data-route="settings" title="Settings">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <span>Settings</span>
    </button>
  </nav>

  <div class="sb-footer">
    <div class="sb-status">
      <span class="status-dot online" id="statusDot"></span>
      <span id="statusLabel">connected</span>
    </div>
    <div class="sb-actions">
      <button class="sb-action" id="openExternalBtn" title="Open in browser">↗</button>
      <button class="sb-action" id="restartServerBtn" title="Restart server">⟳</button>
      <button class="sb-action" id="quitBtn" title="Quit">✕</button>
    </div>
  </div>
</div>
<script src="sidebar.js"></script>
</body>
</html>
