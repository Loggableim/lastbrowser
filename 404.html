<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — Page Not Found</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',-apple-system,sans-serif;background:#080810;color:#D4D4E0;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(124,111,240,0.03)1px,transparent 1px),linear-gradient(90deg,rgba(124,111,240,0.03)1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}.glow{position:fixed;top:-30%;right:-20%;width:600px;height:600px;background:radial-gradient(circle,rgba(124,111,240,0.06)0%,transparent 70%);pointer-events:none;z-index:0}.content{position:relative;z-index:1}.logo{margin-bottom:24px}.code{font-size:clamp(80px,15vw,140px);font-weight:800;line-height:1;background:linear-gradient(135deg,#7C6FF0,#60A5FA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}.title{font-size:20px;font-weight:600;color:#EAEAEF;margin-bottom:12px}.desc{font-size:15px;color:#686888;max-width:400px;margin-bottom:32px;line-height:1.6}.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:10px;font-weight:600;font-size:14px;text-decoration:none;transition:all 0.15s}.btn-primary{background:linear-gradient(135deg,#7C6FF0,#5B4FCC);color:#fff}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(124,111,240,0.35)}.btn-secondary{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#C4C4D8}.btn-secondary:hover{background:rgba(255,255,255,0.08)}
</style>
</head>
<body>
<div class="bg-grid"></div><div class="glow"></div>
<div class="content">
  <div class="logo">
    <svg width="48" height="48" viewBox="0 0 64 64" fill="none">
      <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7C6FF0"/><stop offset="100%" stop-color="#5B4FCC"/></linearGradient></defs>
      <rect x="12" y="12" width="40" height="40" rx="10" fill="url(#g)" opacity="0.15"/>
      <rect x="18" y="14" width="12" height="36" rx="4" fill="url(#g)"/>
      <rect x="18" y="38" width="36" height="12" rx="4" fill="#60A5FA"/>
    </svg>
  </div>
  <div class="code">404</div>
  <div class="title">This page doesn't exist.</div>
  <div class="desc">The page you're looking for was moved, deleted, or never existed. Maybe try the homepage or docs.</div>
  <div class="actions">
    <a href="/" class="btn btn-primary">← Home</a>
    <a href="/docs/guide.html" class="btn btn-secondary">Docs</a>
    <a href="/download.html" class="btn btn-secondary">Download</a>
    <a href="https://github.com/Loggableim/lastbrowser" class="btn btn-secondary">GitHub</a>
  </div>
</div>
</body>
</html>
