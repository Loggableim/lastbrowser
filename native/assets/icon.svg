<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0D0D1A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C6FF0"/>
      <stop offset="100%" stop-color="#5B4FCC"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#4B8BE6"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect x="2" y="2" width="508" height="508" rx="94" fill="none" stroke="#2A2A45" stroke-width="4"/>
  <!-- "L" shape - browser tab abstraction -->
  <g transform="translate(128, 128)">
    <!-- Vertical bar of L -->
    <rect x="40" y="20" width="60" height="216" rx="12" fill="url(#accent)"/>
    <!-- Horizontal bar of L -->
    <rect x="40" y="176" width="216" height="60" rx="12" fill="url(#accent2)"/>
    <!-- Tab-like notch at top -->
    <rect x="100" y="20" width="120" height="16" rx="8" fill="#7C6FF0" opacity="0.4"/>
    <!-- Subtle highlight stroke -->
    <rect x="40" y="20" width="60" height="216" rx="12" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.3"/>
    <rect x="40" y="176" width="216" height="60" rx="12" fill="none" stroke="#93C5FD" stroke-width="2" opacity="0.3"/>
  </g>
</svg>
