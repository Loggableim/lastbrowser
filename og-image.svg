<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A14"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C6FF0"/>
      <stop offset="100%" stop-color="#5B4FCC"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#4B8BE6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#7C6FF0" stroke-width="1"/>
    <line x1="60" y1="0" x2="60" y2="630" stroke="#7C6FF0" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="630" stroke="#7C6FF0" stroke-width="1"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#7C6FF0" stroke-width="1"/>
    <line x1="0" y1="60" x2="1200" y2="60" stroke="#7C6FF0" stroke-width="1"/>
  </g>
  <!-- Glow -->
  <circle cx="900" cy="315" r="300" fill="url(#accent)" opacity="0.06"/>
  <circle cx="300" cy="315" r="200" fill="url(#accent2)" opacity="0.04"/>
  <!-- Logo "L" -->
  <g transform="translate(100, 175)">
    <rect x="0" y="0" width="70" height="280" rx="14" fill="url(#accent)"/>
    <rect x="0" y="210" width="280" height="70" rx="14" fill="url(#accent2)"/>
    <rect x="70" y="0" width="140" height="18" rx="9" fill="#A78BFA" opacity="0.4"/>
  </g>
  <!-- Text -->
  <text x="420" y="260" font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="56" font-weight="800" fill="#EAEAEF" letter-spacing="-2">The last browser</text>
  <text x="420" y="330" font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="56" font-weight="800" fill="#EAEAEF" letter-spacing="-2">you'll ever need.</text>
  <text x="420" y="390" font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="22" fill="#686888">Open-source Electron workspace browser</text>
  <text x="420" y="425" font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" fill="#7C6FF0">AI Agents · Vertical Tabs · Kanban · Split View</text>
  <!-- Divider -->
  <line x1="420" y1="445" x2="700" y2="445" stroke="rgba(124,111,240,0.15)" stroke-width="1"/>
  <!-- Bottom badges -->
  <rect x="420" y="465" width="80" height="28" rx="14" fill="rgba(124,111,240,0.1)"/>
  <text x="460" y="484" font-family="'Inter',sans-serif" font-size="12" fill="#A78BFA" text-anchor="middle">MIT</text>
  <rect x="510" y="465" width="100" height="28" rx="14" fill="rgba(96,165,250,0.1)"/>
  <text x="560" y="484" font-family="'Inter',sans-serif" font-size="12" fill="#60A5FA" text-anchor="middle">Electron</text>
  <rect x="620" y="465" width="80" height="28" rx="14" fill="rgba(74,222,128,0.1)"/>
  <text x="660" y="484" font-family="'Inter',sans-serif" font-size="12" fill="#4ADE80" text-anchor="middle">MIT</text>
  <!-- URL -->
  <text x="420" y="520" font-family="'Inter',sans-serif" font-size="16" fill="#686888">lastbrowser.pawsunited.info</text>
</svg>
