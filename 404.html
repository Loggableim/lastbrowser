<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — Page Not Found</title>
<link rel="icon" href="/img/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/css/fonts.css">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="bg-grid"></div><div class="glow"></div>
<div class="content">
  <div class="logo">
    <svg width="48" height="48" viewBox="0 0 64 64" fill="none">
      <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7C6FF0"/><stop offset="100%" stop-color="#5B4FCC"/></linearGradient></defs>
      <rect x="12" y="12" width="40" height="40" rx="10" fill="url(#g)" opacity="0.15"/>
      <rect x="18" y="14" width="12" height="36" rx="4" fill="url(#g)"/>
      <rect x="18" y="38" width="36" height="12" rx="4" fill="#60A5FA"/>
    </svg>
  </div>
  <div class="code">404</div>
  <div class="title">This page doesn't exist.</div>
  <div class="desc">The page you're looking for was moved, deleted, or never existed. Maybe try the homepage or docs.</div>
  <div class="actions">
    <a href="/" class="btn btn-primary">← Home</a>
    <a href="/docs/guide.html" class="btn btn-secondary">Docs</a>
    <a href="/download.html" class="btn btn-secondary">Download</a>
    <a href="https://github.com/Loggableim/lastbrowser" class="btn btn-secondary">GitHub</a>
  </div>
</div>
<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Scroll to top">
<svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
</button>
<script>window.addEventListener('scroll',function(){document.getElementById('scrollTop').classList.toggle('visible',window.scrollY>300)});</script>
</body>
</html>
